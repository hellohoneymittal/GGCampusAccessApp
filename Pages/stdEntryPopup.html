<!doctype html>
<div class="popup" id="stdEntryPopup">
  <div class="popup-content scrollable-content">
    <div class="refresh-button-container">
      <button class="refresh-btn-new" onclick="stdEntryPopupRefClick()">
        <span class="refresh-text">Refresh</span>
        <span class="refresh-icon">⟳</span>
      </button>
    </div>

    <div class="popup-title-box"></div>

    <div
      class="dynamic-dropdown-container"
      id="stdEntry-dynamic-dropdown-container"
    ></div>
    <div class="button-row">
      <button class="red" id="stdEntry-back" onclick="stdEntryBackBtnClick()">
        Back
      </button>
      <button class="green" id="stdEntry-submit" onclick="stdEntrySubClick()">
        Proceed
      </button>
    </div>
  </div>
</div>
